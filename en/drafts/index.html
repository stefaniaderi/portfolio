<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stefania D'Eri – Portfolio — Sketchbook</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

<header style="position:sticky;top:0;z-index:50;border-bottom:1px solid var(--rule);background:rgba(var(--paper-rgb),.95);backdrop-filter:blur(4px)">
  <div style="display:flex;height:48px;align-items:center;justify-content:space-between;padding:0 2rem">

    <a href="/en" class="mono-label" style="font-weight:900;font-size:10px;text-decoration:none;color:var(--ink)">
      STEFANIA D'ERI
    </a>

    <nav style="display:flex;align-items:center;gap:1.75rem">
              <a href="/en/projects"
           class="mono-label"
           style="font-size:11px;text-decoration:none;text-underline-offset:4px;color:var(--muted);transition:color .2s">
          Work        </a>
              <a href="/en/drafts"
           class="mono-label"
           style="font-size:11px;text-decoration:underline;text-underline-offset:4px;color:var(--ink);transition:color .2s">
          Sketch        </a>
              <a href="/en/bio"
           class="mono-label"
           style="font-size:11px;text-decoration:none;text-underline-offset:4px;color:var(--muted);transition:color .2s">
          Bio        </a>
      
      <!-- IT / EN toggle -->
      <div style="display:flex;border:1px solid var(--rule);margin-left:.5rem">
                <a href="/it/drafts"
          class="lang-btn mono-label"
          style="font-size:10px;padding:.25rem .5rem;text-decoration:none;background:transparent;color:var(--muted)">
            IT          </a>
                <a href="/en/drafts"
          class="lang-btn mono-label"
          style="font-size:10px;padding:.25rem .5rem;text-decoration:none;border-left:1px solid var(--rule);background:var(--ink);color:var(--paper)">
            EN          </a>
            </div>
    </nav>

  </div>
</header>

<section>

  <!-- Header -->
  <div style="padding:0 2rem">
    <div class="page-grid" style="border-bottom:1px solid var(--rule);padding:1.25rem 0">
      <p class="mono-label" style="grid-column:span 2;color:var(--muted)">
        Drafts / 3      </p>
      <div style="grid-column:span 10">
        <h1 style="font-size:clamp(2.8rem,6vw,7rem);font-weight:400;line-height:.9;letter-spacing:-.05em;margin:0">
          Sketchbook        </h1>
      </div>
    </div>
  </div>

  
  
<div 
  class="draft-field"
  style="
    position:relative;
    overflow:hidden;
    user-select:none;
    min-height:calc(100svh - 160px);
    background:var(--paper)
  "
>


<div
  class="draft-card"

  data-x="80"
  data-y="60"
  data-rotate="-3"

  
  style="
    position:absolute;
    width:300px;
    left:80px;
    top:60px;
    z-index:1;
    touch-action:none;
    cursor:grab;
    transform:rotate(-3deg);
    transition:transform .35s cubic-bezier(.22,1,.36,1)
  "
>


<img
  src="/media/pages/drafts/beans/658d9c63c1-1784281524/fagioli.jpg"
  alt="Beans"
  draggable="false"
  style="
    width:100%;

    display:block
  "
>




<div style="padding:.5rem 0 .25rem">


<p class="mono-label" style="color:var(--muted)">
Visual</p>




<p style="
margin-top:.25rem;
font-size:11px;
line-height:1.3;
color:var(--ink)
">
Beans</p>


</div>



</div>


<div
  class="draft-card"

  data-x="380"
  data-y="40"
  data-rotate="4"

  
  style="
    position:absolute;
    width:330px;
    left:380px;
    top:40px;
    z-index:2;
    touch-action:none;
    cursor:grab;
    transform:rotate(4deg);
    transition:transform .35s cubic-bezier(.22,1,.36,1)
  "
>


<img
  src="/media/pages/drafts/interference/3be40eb03e-1784289271/mezzetinte-sfondo.jpg"
  alt="Interference"
  draggable="false"
  style="
    width:100%;

    display:block
  "
>




<div style="padding:.5rem 0 .25rem">


<p class="mono-label" style="color:var(--muted)">
Visual</p>




<p style="
margin-top:.25rem;
font-size:11px;
line-height:1.3;
color:var(--ink)
">
Interference</p>


</div>



</div>


<div
  class="draft-card"

  data-x="660"
  data-y="180"
  data-rotate="-5"

  
  style="
    position:absolute;
    width:285px;
    left:660px;
    top:180px;
    z-index:3;
    touch-action:none;
    cursor:grab;
    transform:rotate(-5deg);
    transition:transform .35s cubic-bezier(.22,1,.36,1)
  "
>


<img
  src="/media/pages/drafts/monogram/f93a1e7437-1784289213/monogram2.jpg"
  alt="Monogram"
  draggable="false"
  style="
    width:100%;

    display:block
  "
>




<div style="padding:.5rem 0 .25rem">


<p class="mono-label" style="color:var(--muted)">
Visual</p>




<p style="
margin-top:.25rem;
font-size:11px;
line-height:1.3;
color:var(--ink)
">
Monogram</p>


</div>



</div>


</div>
</section>

<footer style="margin-top:4rem;border-top:1px solid var(--rule);padding:.9rem 2rem">
  <div style="display:flex;flex-wrap:wrap;justify-content:space-between;gap:1rem;font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)">
    <span>© Stefania D'Eri / Verona, IT</span>
    <div style="display:flex;gap:1.25rem">
      <a href="mailto:stefaniaderi1@gmail.com"
         style="color:inherit;text-decoration:none"
         onmouseover="this.style.color='var(--accent)'"
         onmouseout="this.style.color='inherit'">Email ↗</a>
            <a href="https://www.instagram.com/stefania.d.eri/"
         target="_blank" rel="noopener"
         style="color:inherit;text-decoration:none"
         onmouseover="this.style.color='var(--accent)'"
         onmouseout="this.style.color='inherit'">Instagram ↗</a>
                  <a href="https://www.behance.net/stefaniaderi"
         target="_blank" rel="noopener"
         style="color:inherit;text-decoration:none"
         onmouseover="this.style.color='var(--accent)'"
         onmouseout="this.style.color='inherit'">Behance ↗</a>
          </div>
  </div>
</footer>

  <script src="/assets/js/main.js"></script>
</body>
</html>
